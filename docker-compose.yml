version: '3.8'

services:
  postgres:
    image: postgres:15
    container_name: whatsorder_db
    environment:
      POSTGRES_USER: whatsorder_user
      POSTGRES_PASSWORD: whatsorder_pass
      POSTGRES_DB: whatsorder_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - whatsorder_network

  redis:
    image: redis:7-alpine
    container_name: whatsorder_redis
    ports:
      - "6379:6379"
    networks:
      - whatsorder_network

  adminer:
    image: adminer
    container_name: whatsorder_adminer
    ports:
      - "8080:8080"
    networks:
      - whatsorder_network

networks:
  whatsorder_network:
    driver: bridge

volumes:
  postgres_data: